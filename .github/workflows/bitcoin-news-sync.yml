name: Sync Bitcoin X News

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch X news
        run: python scripts/fetch-x-bitcoin-news.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bitcoin-news.json
          if git diff --staged --quiet; then
            echo "No news changes."
          else
            git commit -m "Aggiorna sessione news Bitcoin da X"
            git push
          fi