name: Facebook Auto Post

on:
  schedule:
    # Ogni 30 minuti, 05:00–20:30 UTC ≈ 07:00–22:30 Roma (CEST)
    - cron: "0,30 5-20 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot 0–19 (vuoto = rileva da orario Roma)"
        required: false
        default: ""
      dry_run:
        description: "Solo test, non pubblicare"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tzdata imageio-ffmpeg numpy Pillow qrcode[pil]
      - name: Sync viral story music
        run: python scripts/generate-viral-story-tracks.py && python scripts/sync-instagram-trending-audio.py || true

      - name: Post to Facebook
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          ARGS="--auto"
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            ARGS="$ARGS --slot ${{ github.event.inputs.slot }}"
          else
            ARGS="$ARGS --now"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/post-to-facebook.py $ARGS

      - name: Commit schedule state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-schedule.json
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento schedule."
          else
            git commit -m "chore: aggiorna facebook-schedule dopo auto-post"
            git push
          fi