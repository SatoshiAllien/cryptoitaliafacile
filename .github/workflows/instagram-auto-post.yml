name: Instagram Auto Post (bitcoin.is.hope2030)

on:
  schedule:
    - cron: "0,30 5-20 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot 0-19 (vuoto = auto)"
        required: false
        default: ""
      dry_run:
        description: "Solo test"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tzdata
        run: pip install tzdata

      - name: Post to Instagram
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          ARGS="--auto"
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            ARGS="$ARGS --slot ${{ github.event.inputs.slot }}"
          else
            ARGS="$ARGS --now"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/post-to-instagram.py $ARGS

      - name: Commit schedule state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-schedule.json
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento schedule."
          else
            git commit -m "chore: aggiorna instagram-schedule dopo auto-post"
            git push
          fi