name: Instagram Auto Post (@krown.82)

on:
  schedule:
    # Ogni 30 min, 05:00–20:00 UTC ≈ 07:00–22:00 Roma — 20 slot/giorno
    - cron: "0,30 5-20 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot 0-19 (vuoto = auto)"
        required: false
        default: ""
      dry_run:
        description: "Solo test"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tzdata imageio-ffmpeg numpy Pillow
      - name: Sync story music (Mixkit pop/EDM)
        run: python scripts/fetch-mixkit-story-music.py || true

      - name: Post to Instagram
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          ARGS="--auto"
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            ARGS="$ARGS --slot ${{ github.event.inputs.slot }}"
          else
            ARGS="$ARGS --now"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/post-to-instagram.py $ARGS

      - name: Commit schedule state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-schedule.json assets/video/stories/published/instagram/
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento schedule/video."
          else
            git commit -m "chore: instagram schedule + story video"
            git push
          fi