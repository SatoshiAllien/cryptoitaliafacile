name: Instagram Batch 20 (Post + Story)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "ID contenuto da cui riprendere (1-20)"
        required: false
        default: "1"
      delay:
        description: "Secondi tra un post e il successivo"
        required: false
        default: "120"
      dry_run:
        description: "Solo test"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tzdata imageio-ffmpeg numpy Pillow qrcode[pil]

      - name: Sync story music
        run: python scripts/fetch-mixkit-story-music.py || true

      - name: Verify batch manifest
        run: python scripts/publish-instagram-batch-20.py --verify

      - name: Publish batch (resume-safe)
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          ARGS="--start ${{ github.event.inputs.start }} --delay ${{ github.event.inputs.delay }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/publish-instagram-batch-20.py $ARGS

      - name: Commit publish state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-batch-20-state.json assets/video/stories/
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento stato."
          else
            git commit -m "chore: instagram batch-20 publish progress"
            git push
          fi