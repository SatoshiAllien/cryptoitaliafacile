name: X Auto Post (TheRiser100x)

on:
  schedule:
    # 5 post/giorno 08:00–21:00 Roma — controlli ogni 30 min
    - cron: "0,30 6-19 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot 0-4 (vuoto=auto)"
        required: false
        default: ""
      dry_run:
        description: "Solo test"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tzdata
        run: pip install tzdata

      - name: Fetch latest crypto news
        run: python scripts/fetch-crypto-news.py

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          ARGS="--auto"
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            ARGS="$ARGS --slot ${{ github.event.inputs.slot }}"
          else
            ARGS="$ARGS --now"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/post-to-x.py $ARGS

      - name: Commit state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-schedule.json data/crypto-news.json data/bitcoin-news.json
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento."
          else
            git commit -m "chore: aggiorna news crypto e schedule X"
            git push
          fi