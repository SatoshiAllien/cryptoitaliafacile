<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Parla con Satoshi — assistente AI crypto di The Little Satoshi News. Chiedi qualsiasi cosa su Bitcoin, sicurezza, DeFi e Web3.">
  <meta name="keywords" content="chatbot crypto, assistente AI bitcoin, satoshi AI, crypto italia">
  <meta property="og:title" content="Parla con Satoshi — Assistente AI Crypto">
  <meta property="og:description" content="Il tuo assistente AI crypto personale. Risposte chiare in italiano su Bitcoin, sicurezza e Web3.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://satoshiallien.github.io/cryptoitaliafacile/chat/">
  <meta property="og:image" content="https://satoshiallien.github.io/cryptoitaliafacile/assets/img/welcome-bitcoin-boss.png">
  <title>Parla con Satoshi — Assistente AI Crypto | The Little Satoshi News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/satoshi-chat.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='6' fill='%230a0a12'/><circle cx='20' cy='20' r='14' fill='none' stroke='%2300f0ff' stroke-width='2'/><text x='20' y='25' text-anchor='middle' font-size='12' font-weight='bold' fill='%23ff2a6d'>LS</text></svg>">
</head>
<body data-page="chat">

  <div id="site-header"></div>

  <main class="chat-page">
    <div class="chat-page-hero">
      <h1 data-i18n="home.aiTitle">Parla con Satoshi</h1>
      <p data-i18n="home.aiDesc">Il tuo assistente AI crypto personale. Chiedi qualsiasi cosa su Bitcoin, sicurezza, DeFi e Web3 — risposte chiare in italiano.</p>
    </div>

    <div class="chat-page-container">
      <div class="chat-page-main">
        <div class="satoshi-panel-header">
          <img src="../assets/img/welcome-bitcoin-boss.png" alt="Satoshi" class="satoshi-panel-avatar">
          <div class="satoshi-panel-info">
            <h3>Satoshi AI</h3>
            <p class="satoshi-status">
              <span class="satoshi-status-dot" id="chat-page-status-dot"></span>
              <span id="chat-page-status-text">Connessione...</span>
            </p>
          </div>
          <div class="satoshi-panel-actions">
            <button class="satoshi-panel-btn" id="chat-page-new" title="Nuova chat" aria-label="Nuova chat">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </div>
        <div class="satoshi-messages" id="chat-page-messages"></div>
        <div class="satoshi-input-area">
          <div class="satoshi-input-wrap">
            <textarea class="satoshi-input" id="chat-page-input" rows="1" placeholder="Chiedi a Satoshi qualsiasi cosa su crypto..." data-i18n-placeholder="ui.satoshiPlaceholder"></textarea>
            <button class="satoshi-send" id="chat-page-send" aria-label="Invia">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="chat-page-tags">
        <span class="ai-feature" data-i18n="home.aiFeature1">Italiano, zero gergo</span>
        <span class="ai-feature" data-i18n="home.aiFeature3">Sicurezza crypto</span>
        <span class="ai-feature" data-i18n="home.aiFeature4">Steven AI</span>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../js/site-config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/satoshi-bot.js"></script>
  <script src="../js/satoshi-chat.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
