<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iscriviti alla newsletter CryptoFacile: 1 tip di sicurezza a settimana + Checklist Sicurezza Crypto gratis.">
  <title>Newsletter — CryptoFacile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-i18n-title="pages.newsletter.metaTitle" data-i18n-desc="pages.newsletter.metaDesc">
  <div id="site-header"></div>
  <main>
    <section class="newsletter-cta" style="min-height:60vh;display:flex;align-items:center;">
      <div class="container">
        <h1 style="color:white;font-size:2rem;margin-bottom:1rem;" data-i18n="pages.newsletter.title">Newsletter CryptoFacile</h1>
        <p data-i18n="pages.newsletter.intro">Iscriviti gratis e ricevi:</p>
        <ul style="text-align:left;max-width:400px;margin:1rem auto 1.5rem;color:rgba(255,255,255,0.9);">
          <li data-i18n="pages.newsletter.item1">1 tip di sicurezza a settimana</li>
          <li data-i18n="pages.newsletter.item2">Nuove guide passo-passo</li>
          <li data-i18n="pages.newsletter.item3">Checklist Sicurezza Crypto (PDF) in regalo</li>
        </ul>
        <form class="newsletter-form">
          <input type="email" data-i18n-placeholder="ui.emailPlaceholder" placeholder="La tua email" required data-i18n-aria="ui.emailAria" aria-label="Email">
          <button type="submit" class="btn" data-i18n="ui.subscribe">Iscriviti gratis</button>
        </form>
        <p class="newsletter-note" data-i18n="home.nlNote">Niente spam. Solo contenuti educativi. Cancellati quando vuoi.</p>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../js/site-config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
