<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Confronti e guide su wallet, exchange, tracker e strumenti crypto consigliati.">
  <title>Strumenti Crypto — The Little Satoshi News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-hub="strumenti">
  <div id="site-header"></div>
  <main class="container">
    <section class="page-hero">
      <h1>Strumenti Crypto</h1>
      <p>Guide e confronti su wallet, exchange, hardware wallet e strumenti di monitoraggio.</p>
    </section>
    <div class="articles-grid" id="hub-articles"></div>
    <section class="section">
      <h2>Strumenti consigliati</h2>
      <div class="tools-grid" id="tools-grid"></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../js/site-config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tools = document.getElementById('tools-grid');
      if (tools) {
        tools.innerHTML = SITE_CONFIG.tools.map(t => `
          <div class="tool-card">
            <div class="tool-category">${t.category}</div>
            <h3>${t.name}</h3>
            <p>${t.desc}</p>
          </div>`).join('');
      }
    });
  </script>
</body>
</html>
